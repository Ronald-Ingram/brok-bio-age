# Full production stack — api + web (built images)
# Usage: docker compose up --build

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      BIOAGE_CORS_ORIGINS: "http://localhost:3000"
      BIOAGE_ENABLE_LLM_PARSE: "false"
      BIOAGE_PERSIST_UPLOADS: "false"
      BIOAGE_METRICS_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
# fly.toml app configuration file generated for brok-bioage-api on 2026-07-06T02:52:31-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'brok-bioage-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'
  build-target = 'api'

[env]
  BIOAGE_CORS_ORIGINS = 'http://localhost:3000,https://brok.neobanx.com,https://web-phi-murex-97.vercel.app,https://bio-age.kiron.ai,https://web-neobanx-zpe.vercel.app'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
